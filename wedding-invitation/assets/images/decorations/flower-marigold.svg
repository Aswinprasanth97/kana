<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Marigold flower">
  <defs>
    <radialGradient id="mg-o" cx=".5" cy=".5" r=".6">
      <stop offset="0" stop-color="#F6C24A"/>
      <stop offset="1" stop-color="#E68A24"/>
    </radialGradient>
    <radialGradient id="mg-i" cx=".5" cy=".45" r=".6">
      <stop offset="0" stop-color="#FBD66A"/>
      <stop offset="1" stop-color="#F0A62F"/>
    </radialGradient>
  </defs>
  <!-- outer ring of 12 petals -->
  <g fill="url(#mg-o)">
    <g>
      <ellipse cx="24" cy="7" rx="4.4" ry="7"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(30 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(60 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(90 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(120 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(150 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(180 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(210 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(240 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(270 24 24)"/>
      <ellipse cx="24" cy="7" rx="4.4" ry="7" transform="rotate(300 24 24)"/>
