    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(67 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(112 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(157 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(202 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(247 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(292 24 24)"/>
    <ellipse cx="24" cy="13" rx="3.6" ry="5.4" transform="rotate(337 24 24)"/>
  </g>
  <circle cx="24" cy="24" r="4.6" fill="#D9781E"/>
